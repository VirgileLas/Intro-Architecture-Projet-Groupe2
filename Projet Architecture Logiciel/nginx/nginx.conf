events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Redirection vers le service d'authentification (Logger)
        location /api/auth/ {
            proxy_pass http://auth-service:8080/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Endpoint interne Nginx pour vérifier le token sur les requêtes protégées
        location = /auth-validate {
            internal;
            proxy_pass http://auth-service:8080/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Service A : Protégé par le système d'authentification
        location /service-a/ {
            auth_request /auth-validate;
            proxy_pass http://service-a:8081/;
            
            error_page 401 403 = @error401;
        }

        # Service B : Protégé par le système d'authentification
        location /service-b/ {
            auth_request /auth-validate;
            proxy_pass http://service-b:8082/;
            
            error_page 401 403 = @error401;
        }

        # Message d'erreur personnalisé en cas d'échec d'authentification
        location @error401 {
            default_type application/json;
            return 401 '{"error": "Unauthorized. You are either not registered, not enabled, or missing a valid token."}';
        }

        # Redirection vers la console H2 de la base de données
        location /h2-console/ {
            proxy_pass http://auth-service:8080/h2-console/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # S'il y a d'autres routes à l'avenir, elles seront déclarées ici...
    }
}
