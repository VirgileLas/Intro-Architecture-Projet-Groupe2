events {
    worker_connections 1024;
}
http {
    server {
        listen 80;
        location /api/auth/ {
            proxy_pass http://auth-service:8080/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /auth-validate-service-a {
            internal;
            proxy_pass http://auth-service:8080/api/auth/validate?requiredRole=ROLE_SERVICE_A;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
        location = /auth-validate-service-b {
            internal;
            proxy_pass http://auth-service:8080/api/auth/validate?requiredRole=ROLE_SERVICE_B;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
        location /service-a/ {
            auth_request /auth-validate-service-a;
            proxy_pass http://service-a:8081/;
            error_page 401 = @error401;
            error_page 403 = @error403;
        }
        location /service-b/ {
            auth_request /auth-validate-service-b;
            proxy_pass http://service-b:8082/;
            error_page 401 = @error401;
            error_page 403 = @error403;
        }
        location @error401 {
            default_type application/json;
            return 401 '{"error": "Unauthorized. Missing or invalid authentication token. Please login."}';
        }
        location @error403 {
            default_type application/json;
            return 403 '{"error": "Forbidden. Your account is not verified, deactivated, or lacks the required role for this service."}';
        }
        location /h2-console/ {
            proxy_pass http://auth-service:8080/h2-console/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
