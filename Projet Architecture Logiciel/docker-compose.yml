version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80" # On expose le port 80 de Nginx sur le port 8080 de l'hôte (pour que localhost:8080 fonctionne sans rien changer)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

  auth-service:
    build:
      context: ./Logger 
    # REMARQUE : Plus de bloc 'ports:' ici ! Le service n'est plus accessible directement, uniquement via Nginx.
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - app-network

  notification-service:
    build:
      context: ./Messagerie 
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_MAIL_HOST=mailhog
    depends_on:
      - rabbitmq
      - mailhog
    networks:
      - app-network

  service-a:
    image: hashicorp/http-echo
    command: -text="Hello A" -listen=:8081
    networks:
      - app-network

  service-b:
    image: hashicorp/http-echo
    command: -text="Hello B" -listen=:8082
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
